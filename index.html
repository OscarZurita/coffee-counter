<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f37d9b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Coffee Counter" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="A minimal coffee counter with one illustrated cup button."
    />
    <title>Coffee Counter</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/coffee_pink_background.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/coffee_pink_background.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="counterScreen" class="counter-screen" aria-hidden="false">
        <button
          id="settingsButton"
          class="icon-button settings-button"
          type="button"
          aria-label="Open settings"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3.2"></circle>
            <path
              d="M12 2.9v2.2M12 18.9v2.2M21.1 12h-2.2M5.1 12H2.9M18.44 5.56l-1.56 1.56M7.12 16.88l-1.56 1.56M18.44 18.44l-1.56-1.56M7.12 7.12 5.56 5.56"
            ></path>
          </svg>
        </button>

        <span class="counter-readout" aria-hidden="true">
          <span id="totalCount" class="counter-value">0</span>
        </span>

        <button
          id="counterButton"
          class="counter-button"
          type="button"
          aria-describedby="screenReaderStatus"
        >
          <span class="button-shadow" aria-hidden="true"></span>
          <span class="cup-shell" aria-hidden="true">
            <img
              id="cupArt"
              class="cup-art"
              src="assets/my_coffee_cup1.png"
              alt=""
              width="1080"
              height="1080"
            />
          </span>
          <span id="plusOne" class="plus-one" aria-hidden="true">+1</span>
        </button>
      </section>

      <section id="settingsScreen" class="settings-screen" aria-hidden="true">
        <div class="settings-panel">
          <header class="settings-header">
            <button
              id="closeSettingsButton"
              class="icon-button close-button"
              type="button"
              aria-label="Close settings"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18 9 12l6-6"></path>
              </svg>
            </button>
            <h1 class="settings-title">Settings</h1>
          </header>

          <label class="setting-group" for="backgroundColorInput">
            <span class="setting-label">Background Color</span>
            <div class="color-control">
              <input
                id="backgroundColorInput"
                class="color-input"
                type="color"
                value="#f37d9b"
              />
              <span id="backgroundColorValue" class="setting-value">#F37D9B</span>
            </div>
          </label>

          <section class="setting-group" aria-labelledby="imageSettingLabel">
            <div class="setting-row">
              <h2 id="imageSettingLabel" class="setting-label">Image</h2>
              <label for="customImageInput" id="uploadButton" class="upload-button">
                Upload
              </label>
              <input id="customImageInput" type="file" accept="image/*" hidden />
            </div>

            <div class="image-options">
              <label class="image-option">
                <input
                  class="image-radio"
                  type="radio"
                  name="cupImage"
                  value="reference"
                />
                <span class="image-card">
                  <img
                    class="image-thumb"
                    src="assets/my_coffee_cup1.png"
                    alt=""
                    width="1080"
                    height="1080"
                  />
                  <span class="image-name">Reference</span>
                </span>
              </label>

              <label class="image-option">
                <input
                  class="image-radio"
                  type="radio"
                  name="cupImage"
                  value="minimal"
                />
                <span class="image-card">
                  <img
                    class="image-thumb"
                    src="assets/coffee-cup.svg"
                    alt=""
                    width="520"
                    height="380"
                  />
                  <span class="image-name">Minimal</span>
                </span>
              </label>

              <label id="customImageCard" class="image-option">
                <input
                  id="customImageRadio"
                  class="image-radio"
                  type="radio"
                  name="cupImage"
                  value="custom"
                />
                <span class="image-card image-card-custom">
                  <img
                    id="customPreview"
                    class="image-thumb"
                    src="assets/my_coffee_cup1.png"
                    alt=""
                    width="1080"
                    height="1080"
                  />
                  <span id="customImageLabel" class="image-name">Custom</span>
                </span>
              </label>
            </div>
          </section>

          <button id="resetCounterButton" class="reset-button" type="button">
            Reset Counter
          </button>
        </div>
      </section>

      <p id="screenReaderStatus" class="sr-only" aria-live="polite">
        Coffee counter ready.
      </p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
