<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f37d9b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Coffee Counter" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="A minimal coffee counter with one illustrated cup button."
    />
    <title>Coffee Counter</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/my_coffee_cup1.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/my_coffee_cup1.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="counterScreen" class="counter-screen" aria-hidden="false">
        <button
          id="settingsButton"
          class="icon-button settings-button"
          type="button"
          aria-label="Open settings"
        >
          <svg class="settings-gear" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M10.86 2.57c.42-1.6 2.7-1.6 3.12 0l.14.52a1.66 1.66 0 0 0 2.5 1.03l.46-.29c1.4-.87 3.02.75 2.15 2.15l-.29.46a1.66 1.66 0 0 0 1.03 2.5l.52.14c1.6.42 1.6 2.7 0 3.12l-.52.14a1.66 1.66 0 0 0-1.03 2.5l.29.46c.87 1.4-.75 3.02-2.15 2.15l-.46-.29a1.66 1.66 0 0 0-2.5 1.03l-.14.52c-.42 1.6-2.7 1.6-3.12 0l-.14-.52a1.66 1.66 0 0 0-2.5-1.03l-.46.29c-1.4.87-3.02-.75-2.15-2.15l.29-.46a1.66 1.66 0 0 0-1.03-2.5l-.52-.14c-1.6-.42-1.6-2.7 0-3.12l.52-.14a1.66 1.66 0 0 0 1.03-2.5l-.29-.46c-.87-1.4.75-3.02 2.15-2.15l.46.29a1.66 1.66 0 0 0 2.5-1.03l.14-.52ZM12.42 9.25a2.75 2.75 0 1 0 0 5.5 2.75 2.75 0 0 0 0-5.5Z"
            />
          </svg>
        </button>

        <span class="counter-readout" aria-hidden="true">
          <span id="totalCount" class="counter-value">0</span>
        </span>

        <button
          id="counterButton"
          class="counter-button"
          type="button"
          aria-describedby="screenReaderStatus"
        >
          <span class="button-shadow" aria-hidden="true"></span>
          <span class="cup-shell" aria-hidden="true">
            <img
              id="cupArt"
              class="cup-art"
              src="assets/my_coffee_cup1.png"
              alt=""
              width="1080"
              height="1080"
            />
          </span>
          <span id="plusOne" class="plus-one" aria-hidden="true">+1</span>
        </button>
      </section>

      <div
        id="updateBanner"
        class="update-banner"
        role="status"
        aria-live="polite"
        aria-hidden="true"
      >
        <span class="update-banner-text">A new version is ready.</span>
        <button id="refreshAppButton" class="update-banner-button" type="button">
          Refresh
        </button>
      </div>

      <section id="settingsScreen" class="settings-screen" aria-hidden="true">
        <div class="settings-panel">
          <header class="settings-header">
            <button
              id="closeSettingsButton"
              class="icon-button close-button"
              type="button"
              aria-label="Close settings"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18 9 12l6-6"></path>
              </svg>
            </button>
            <h1 class="settings-title">Settings</h1>
          </header>

          <label class="setting-group" for="backgroundColorInput">
            <span class="setting-label">Background Color</span>
            <div class="color-control">
              <input
                id="backgroundColorInput"
                class="color-input"
                type="color"
                value="#f37d9b"
              />
              <span id="backgroundColorValue" class="setting-value">#F37D9B</span>
            </div>
          </label>

          <section class="setting-group" aria-labelledby="imageSettingLabel">
            <div class="setting-row">
              <h2 id="imageSettingLabel" class="setting-label">Image</h2>
            </div>
            <p class="setting-hint">Tap any icon to switch it instantly.</p>

            <div class="image-options">
              <label class="image-option">
                <input
                  class="image-radio"
                  type="radio"
                  name="cupImage"
                  value="reference"
                />
                <span class="image-card">
                  <span class="image-visual">
                    <img
                      class="image-thumb"
                      src="assets/my_coffee_cup1.png"
                      alt=""
                      width="1080"
                      height="1080"
                    />
                  </span>
                  <span class="image-copy">
                    <span class="image-title">Classic Cup</span>
                    <span class="image-subtitle">The cozy coffee cup illustration.</span>
                  </span>
                  <span class="image-check" aria-hidden="true"></span>
                </span>
              </label>

              <label class="image-option">
                <input
                  class="image-radio"
                  type="radio"
                  name="cupImage"
                  value="colacao"
                />
                <span class="image-card">
                  <span class="image-visual">
                    <img
                      class="image-thumb"
                      src="assets/colacao%201.png"
                      alt=""
                      width="500"
                      height="500"
                    />
                  </span>
                  <span class="image-copy">
                    <span class="image-title">Colacao</span>
                    <span class="image-subtitle">The glass and yellow tin version.</span>
                  </span>
                  <span class="image-check" aria-hidden="true"></span>
                </span>
              </label>

              <label class="image-option">
                <input
                  class="image-radio"
                  type="radio"
                  name="cupImage"
                  value="taza"
                />
                <span class="image-card">
                  <span class="image-visual">
                    <img
                      class="image-thumb"
                      src="assets/Taza%20icono%20cafe.png"
                      alt=""
                      width="768"
                      height="768"
                    />
                  </span>
                  <span class="image-copy">
                    <span class="image-title">Coffee Mug</span>
                    <span class="image-subtitle">The yellow mug icon version.</span>
                  </span>
                  <span class="image-check" aria-hidden="true"></span>
                </span>
              </label>
            </div>
          </section>

          <section class="setting-group" aria-labelledby="historySettingLabel">
            <div class="setting-row">
              <h2 id="historySettingLabel" class="setting-label">Click History</h2>
              <span id="historyCountValue" class="setting-value">0 saved</span>
            </div>
            <p class="setting-hint">
              Saved only on this device. Every tap keeps its own date and time.
            </p>

            <div class="history-panel">
              <p id="historySummary" class="history-summary">No coffees recorded yet.</p>
              <ul id="historyList" class="history-list"></ul>
            </div>

            <div class="history-actions">
              <button id="exportHistoryButton" class="secondary-button" type="button">
                Export CSV
              </button>
              <button
                id="clearHistoryButton"
                class="secondary-button secondary-button-danger"
                type="button"
              >
                Clear History
              </button>
            </div>
          </section>

          <button id="resetCounterButton" class="reset-button" type="button">
            Reset Counter
          </button>
        </div>
      </section>

      <p id="screenReaderStatus" class="sr-only" aria-live="polite">
        Coffee counter ready.
      </p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
