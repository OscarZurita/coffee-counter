<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f37d9b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Coffee Counter" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="A minimal coffee counter with a single tap-anytime cup button."
    />
    <title>Coffee Counter</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/coffee-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/coffee-icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <button
        id="counterButton"
        class="counter-button"
        type="button"
        aria-describedby="screenReaderStatus"
      >
        <img
          class="cup-art"
          src="assets/coffee-cup.svg"
          alt=""
          width="520"
          height="380"
        />
      </button>

      <p id="screenReaderStatus" class="sr-only" aria-live="polite">
        Coffee counter ready.
      </p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
